- proto: BookBase
  entities:
  - uid: 919
    components:
    - type: MetaData
      desc: Сборник стихов и гимнов дротткветт под названием "Поэзия скальдов" за авторством Хьюго Дракенберга.
      name: сборник стихов "Поэзия скальдов"
    - type: Transform
      pos: 40.63494,29.37681
      parent: 2
    - type: Paper
      content: >-
        [head=3] Сборник гимнов и стихов дротткветт
         "Поэзия скальдов"
        Автор: Хьюго Дракенберг[/head]


        [head=3] Львы Рагнара[/head]

        О, выслушайте песнь мою,

        О воины, львы Рагнара,

        Кто с честью несет брань свою,

        Тот достойнее солнца света.


        Звучит мощно древняя мелодия,

        Которой Один наделил нас,

        Стойте крепко, вступайте в натиск,

        Ломайте врагов в смертельном бою.


        И вот на поле, среди крови,

        Один с окровавленным мечом,

        Он стоит смело, презрев смерть,

        За Рагнара он в бой идет.


        И силней врагов, тот кто мстит,

        Он не будет сдаваться, до тех пор,

        Пока не услышит последний крик,

        Пока не совершит последний удар.


        Этот гимн мы поем всей душой,

        Среди огня и дождя боя,

        Мы не побоимся даже смерти,

        Ведь мы - воины, львы Рагнара!


        [head=3] Драконобой[/head]

        Король драконов, над миром правит он,

        Сердце его полно ярости и огня.

        С боевым кличем встреть его на поле брани,

        Герой - ты ли его победишь или падёшь.


        Сила дракона в душе каждого героя,

        Его песнь разносится на ветру вдали.

        Но воин жив, пока сердце бьется в груди,

        Он не уступит, победит и жизнь отдаст за свободу.


        Король драконов - враг навсегда с нами,

        Герой, иди в бой - он знает тебя в лицо.

        Побеждай его в смертельной схватке,

        Чтобы мир был свободен, а зло было искоренено.


        Слава тебе, герой, первому в бою,

        Поднимай свой клинок на вершину горы.

        Пусть песня драконов за тобой звучит,

        И спокойствие к тебе навсегда приходит.


        [head=3] Мифоходцы[/head]

        Средь древних гор, где бьется молний зарево,

        Зовут нас в битву трубы веков и гром,

        Там где молвят легенды голосом героев,

        Скальд воспевает доблесть сердец мужественных.


        Тьма разрывается при свете наших клинков,

        На поле сражений четко звучит бой копий - колесниц зарниц.

        Река героических древних обнимает нашу плоть,

        Веселие грома, оно блестит рядом с нами в борьбе.


        О, славься, эпоха волшебных преданий!

        Где миры сфер сталкиваются, небес колыбель,

        Орлы величаво парят средь бури, дурманя крылами,

        Что дарят нам поэзию бескрылых подвигов и огонь звезд.


        Оружие светлое отбрасывает мрак,

        Рука воина становится крепче благодаря стремлению,

        Глаза мудрых во мгле ищут истину надежды,

        Вожаки, наш путь, зажигая свет просветления.


        Твердь гудит от воющих зверей мощных,

        Духи времен, они помогают в жестоком поединке,

        Омега зари, их взор призывает нас в последний бой,

        Ни одного костра не погаснет, пока дух наш не иссякнет.


        О, славься, эпоха волшебных преданий!

        Где миры сфер сталкиваются, небес колыбель,

        Орлы величаво парят средь бури, дурманя крылами,

        Что дарят нам поэзию бескрылых подвигов и огонь звезд.


        Сферы искрами света заполняют небосвод,

        Волшебство богов претворяет нас в памятник истине,

        Книга историй, переплетенных вожделением и любовью пропитана,

        Наши души пылают в ней, и создают их вечную магию.


        О, славься, эпоха волшебных преданий!

        Где миры сфер сталкиваются, небес колыбель,

        Орлы величаво парят средь бури, дурманя крылами,

        Что дарят нам поэзию бескрылых подвигов и огонь звезд.



        [head=3] Стремление[/head]

        Взлетает птица в небеса высоко,

        Крылья у неё словно золото блестят,

        Она мчится, не останавливаясь ни на миг,

        Никому не подчиняясь и не смотря назад.


        Она свободна, как ветер на равнине,

        Как капли дождя на лепестках цветов,

        Её глаза полны радости и света,

        Она живёт каждый день, словно последний в жизни.


        Если ты смеешься, значит ты живёшь,

        Если ты любишь, значит есть смысл в твоей жизни,

        Не смотря на всё, что тебе придётся пройти,

        Помни, что всегда рядом свет открывается душе.



        [head=3] Мечты[/head]

        Скользящие мечты в голове моей

        Ловятся за хвост, словно рыбьи затейники

        Они танцуют, кружатся в экстазе

        И тонут в гуле затаившейся пустоты


        Но затем они вновь появляются

        Предвкушая победу над реальностью

        И я забываюсь, словно во сне

        Волшебство слов их поражает меня


        Но затем приходит утро, и все развеивается

        Мечты исчезают, растворяясь в воздухе

        И жизнь продолжает свой путь

        Оставляя на сердце лишь небольшой след



        [head=3] Воспоминания[/head]

        Северный ветер веет сильно,

        Ледяные капли стучат в окно.

        Я вспоминаю давний поход,

        Когда с друзьями в лес уходил.


        Тогда мы бились за каждый шажок,

        Мужество наше рвало преграды.

        Мы были героями, свинцовыми ребятами,

        И даже боги обращали на нас внимание.


        Сейчас я сижу один, без сил и без молва,

        Только мысль моя уносится вдаль,

        Где солнце осталось навсегда,

        И не знает, что такое лед и сталь.


        Сколько времени потрачено на бег,

        Сколько сил потрачено на бой,

        Теперь я знаю, что это все не для меня,

        И я готов покинуть все это навсегда.


        Но я не оставлю свою родину,

        Ни горы, ни озера, ни рождественскую вьюгу,

        И если я умру сегодня на небе,

        То я стану частью великой древности.



        [head=3] О, скальды![/head]

        О, скальды былых времен,

        Когда герои грозились мечом,

        Который мерцал в солнечных лучах,

        Обагряя землю кровавым потоком.


        Идут битвы, кричат щиты,

        Топчется земля стопами стальными,

        Но герои не знают страха,

        Свято веря в свои силы.


        О, скальды, пусть тучи сгущаются,

        И мраком на землю сажая тень,

        Но герои все равно на подступах,

        В тысячу грудей звучит громкий клич "Берегись, враг!"


        И хоть бой не разрешится быстро,

        Их душа тверда как сталь,

        И в битве этих кровавых мгновений

        На веки запечатлится их дух и храбрость на все времена!
  - uid: 920
    components:
    - type: MetaData
      desc: Произведение А.С.Пушкина "У лукоморья дуб зелёный". Вы сомневаетесь, что в то время знали о плазме и Старшинове.
      name: '"У лукоморья дуб зелёный". Оригинальное издание без корректировок'
    - type: Transform
      pos: 30.757011,48.2618
      parent: 2
    - type: Paper
      content: >2
                            Алесандр Сергеевич Пушкин
           У лукоморья дуб зелёный: Оригинальное издание

        У лукоморья дуб зелёный;

        Златая цепь на дубе том:

        И днём и ночью кот учёный

        Всё ходит по цепи кругом;

        Идёт направо — песнь заводит,

        Налево — сказку говорит.

        Там чудеса: там леший бродит,

        Русалка на ветвях сидит;

        Там на неведомых дорожках

        Следы невиданных зверей;

        Избушка там на курьих ножках

        Стоит без окон, без дверей;

        Там лес и дол видений полны;

        Там о заре прихлынут волны

        На брег песчаный и пустой,

        И тридцать ОБР прекрасных

        Чредой из космо вод выходят ясных,

        И с ними дядька их морской;

        Там королевич мимоходом

        Пленяет грозного царя;

        Там в облаках перед народом

        Через леса, через моря

        Колдун несёт богатыря;

        В темнице там царевна тужит,

        А бурый волк ей верно служит;

        Там ступа с Бабою Ягой

        Идёт, бредёт сама собой,

        Там царь Старшинов над златом чахнет;

        Там космо дух… там плазмой пахнет!

        И там я был, и спейс-ап я пил;

        У моря видел дуб зелёный;

        Под ним сидел, и кот учёный

        Свои мне сказки говорил.
